  <text x="48" y="37" clip-path="url(#reveal0)" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="17" fill="#212529">Programs must be written for</text><text x="48" y="63" clip-path="url(#reveal1)" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="17" fill="#212529">people to read, and only</text><text x="48" y="89" clip-path="url(#reveal2)" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="17" fill="#212529">incidentally for machines to</text>
