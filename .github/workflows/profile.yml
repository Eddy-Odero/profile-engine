name: Rebuild Profile README

on:
  schedule:
    # Every 6 hours - tune this once Phase 7 lands
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

# Without this, GITHUB_TOKEN defaults to read-only on most repos created
# since Feb 2023, and the final "git push" step fails with a 403/permission
# error even though everything before it succeeds.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build.py

      - name: Commit changes
        run: |
          git config --global user.name "profile-bot"
          git config --global user.email "profile-bot@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update README"
          git push
